
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Questions 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Playwrite+AU+NSW:wght@400&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Playwrite AU NSW", cursive;

    background:url("1.png") center center/cover no-repeat fixed;

    min-height:100vh;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    color:black;
}

/* Main Content */

#container{

    text-align:center;

    width:90%;

    max-width:900px;
}


.buttonRow{

    display:flex;

    justify-content:center;

    gap:20px;

    flex-wrap:wrap;
}

.btn{

    border:none;

    border-radius:50px;

    padding:16px 35px;

    font-size:18px;

    cursor:pointer;

    font-family:"Playwrite AU NSW", cursive;

    background:#ff8fc7;

    color:white;

    box-shadow:0 8px 20px rgba(255,105,180,.35);

    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
}


#question{

    font-size:clamp(24px,4vw,42px);

    margin-bottom:35px;

    text-shadow:0 3px 15px rgba(0,0,0,0.4);

    background:rgba(255,255,255,0.22);

    backdrop-filter:blur(8px);

    padding:20px 30px;

    border-radius:25px;

    display:inline-block;
}

/* Fade text */

.fadeText{

    font-size:clamp(26px,5vw,54px);

    opacity:0;

    transition:1s;

    background:rgba(255,255,255,0.22);

    backdrop-filter:blur(8px);

    padding:25px 35px;

    border-radius:25px;

    display:inline-block;

    text-shadow:0 3px 15px rgba(0,0,0,0.4);
}

/* Forgive Screen */

#forgiveScreen{
    display:none;
}


#forgiveArea{

    position:relative;

    width:100%;

    max-width:700px;

    height:400px;

    margin:auto;
}


#yesBtn{

    position:relative;
}

#noBtn{

    position:absolute;

    left:60%;
    top:150px;
}



</style>
</head>

<body>

<!-- Spotify Card -->


<div id="container">

    <div id="readyScreen">

        <div id="question">Are you ready? 🤍</div>

        <div class="buttonRow">

            <button class="btn" onclick="startJourney()">Yes</button>

            <button class="btn" onclick="startJourney()">Of Course</button>

        </div>

    </div>

    <div id="messageScreen" style="display:none;">

        <div id="message" class="fadeText"></div>

    </div>

   

        <div id="forgiveScreen" style="display:none;">

    <div id="question">
        Do you forgive me for forgetting your birthday? 🥺
    </div>

    <div id="forgiveArea">

        <button class="btn" id="yesBtn">
            Yes 🤍
        </button>

        <button class="btn" id="noBtn">
            No 😤
        </button>

    </div>

</div> 
<audio id="bgMusic">
    <source src="1st.mp3" type="audio/mpeg">
</audio>
</div>
<script>

/* ---------- Journey Flow ---------- */

function startJourney(){

    document.getElementById("readyScreen").style.display="none";

    const audio = document.getElementById("bgMusic");

    audio.play().catch(()=>{});

    showMessage("Great! 🎉",1500,()=>{

        showMessage("Happy Birthday! 🎂🤍",2500,()=>{

            document.getElementById("messageScreen").style.display="none";

            document.body.style.background =
            'url("sry.png") center center/cover no-repeat fixed';

            document.getElementById("forgiveScreen").style.display="block";

        });

    });
}function showMessage(text,time,next){

    const screen=document.getElementById("messageScreen");

    const msg=document.getElementById("message");

    screen.style.display="block";

    msg.innerHTML=text;

    msg.style.opacity="0";

    setTimeout(()=>{

        msg.style.opacity="1";

    },50);

    setTimeout(()=>{

        msg.style.opacity="0";

    },time);

    setTimeout(()=>{

        next();

    },time+1000);
}

/* ---------- Forgive Section ---------- */

const noBtn=document.getElementById("noBtn");

function moveNoButton(){

    const area = document.getElementById("forgiveArea");

    const btnWidth = noBtn.offsetWidth;

    const btnHeight = noBtn.offsetHeight;

    const maxX = area.clientWidth - btnWidth;

    const maxY = area.clientHeight - btnHeight;

    const x = Math.random() * maxX;

    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";

    noBtn.style.top = y + "px";
}
noBtn.addEventListener("mouseover", moveNoButton);

noBtn.addEventListener("click", moveNoButton);

noBtn.addEventListener("touchstart", (e) => {

    e.preventDefault();

    moveNoButton();

});

document.getElementById("yesBtn").addEventListener("click",()=>{

    document.getElementById("forgiveScreen").innerHTML=

    "<h1 style='font-size:48px;'>You're the best! 🤍</h1>";

    setTimeout(()=>{

        window.location.href="2nd.html";

    },2000);

});


</script>

</body>
</html>
