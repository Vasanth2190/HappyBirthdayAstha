
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Questions 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Playwrite+AU+NSW:wght@400&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Playwrite AU NSW", cursive;

    background:url("1.png") center center/cover no-repeat fixed;

    min-height:100vh;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    color:black;
}

/* Main Content */

#container{

    text-align:center;

    width:90%;

    max-width:900px;
}


.buttonRow{

    display:flex;

    justify-content:center;

    gap:20px;

    flex-wrap:wrap;
}

.btn{

    border:none;

    border-radius:50px;

    padding:16px 35px;

    font-size:18px;

    cursor:pointer;

    font-family:"Playwrite AU NSW", cursive;

    background:#ff8fc7;

    color:white;

    box-shadow:0 8px 20px rgba(255,105,180,.35);

    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
}


#question{

    font-size:clamp(24px,4vw,42px);

    margin-bottom:35px;

    text-shadow:0 3px 15px rgba(0,0,0,0.4);

    background:rgba(255,255,255,0.22);

    backdrop-filter:blur(8px);

    padding:20px 30px;

    border-radius:25px;

    display:inline-block;
}

/* Fade text */

.fadeText{

    font-size:clamp(26px,5vw,54px);

    opacity:0;

    transition:1s;

    background:rgba(255,255,255,0.22);

    backdrop-filter:blur(8px);

    padding:25px 35px;

    border-radius:25px;

    display:inline-block;

    text-shadow:0 3px 15px rgba(0,0,0,0.4);
}

/* Forgive Screen */

#forgiveScreen{
    display:none;
}


#forgiveArea{

    position:relative;

    width:100%;

    max-width:700px;

    height:400px;

    margin:auto;
}


#yesBtn{

    position:relative;
}

#noBtn{

    position:absolute;

    left:60%;
    top:150px;
}

/* Spotify Player */

#musicPlayer{

    display:none;

    width:100%;
    max-width:320px;

    margin:25px auto 0 auto;

    background:#121212;

    color:white;

    padding:18px;

    border-radius:24px;

    box-shadow:0 10px 25px rgba(0,0,0,.4);
}
#albumArt{

    width:180px;
    height:180px;

    object-fit:cover;

    border-radius:15px;

    display:block;

    margin:auto;
}

#songTitle{

    margin-top:12px;

    font-size:14px;
}

#artist{

    color:#b3b3b3;

    font-size:12px;

    margin-bottom:12px;
}

/* Visualizer */

#visualizer{

    display:flex;

    justify-content:center;

    align-items:flex-end;

    gap:3px;

    height:25px;

    margin-bottom:15px;
}

.bar{

    width:4px;

    background:#ff8fc7;

    border-radius:10px;

    animation:bounce .8s infinite alternate;
}

.bar:nth-child(2){animation-delay:.1s;}
.bar:nth-child(3){animation-delay:.2s;}
.bar:nth-child(4){animation-delay:.3s;}
.bar:nth-child(5){animation-delay:.4s;}
.bar:nth-child(6){animation-delay:.2s;}
.bar:nth-child(7){animation-delay:.1s;}

@keyframes bounce{

    from{height:6px;}
    to{height:22px;}
}

.paused .bar{
    animation-play-state:paused;
}

/* Progress */

#progressBar{

    width:100%;

    accent-color:#ff8fc7;
}

#timeDisplay{

    display:flex;

    justify-content:space-between;

    margin-top:5px;

    color:#b3b3b3;

    font-size:12px;
}

/* Play Pause */

#playPauseBtn{

    width:60px;
    height:60px;

    border:none;

    border-radius:50%;

    background:#ff8fc7;

    color:white;

    font-size:24px;

    cursor:pointer;

    margin-top:15px;
}

@media(max-width:768px){

    #musicPlayer{

        width:260px;

        right:10px;
        top:10px;
    }

    #albumArt{

        width:120px;
        height:120px;
    }
}

</style>
</head>

<body>

<!-- Spotify Card -->

<div id="musicPlayer">

    <img src="1stcover.jpg" id="albumArt">

    <div id="songTitle">Love me More</div>

    <div id="artist">Mitski</div>

    <div id="visualizer">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

    <input type="range" id="progressBar" value="0" min="0" max="100">

    <div id="timeDisplay">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
    </div>

    <button id="playPauseBtn">⏸</button>

</div>

<div id="container">

    <div id="readyScreen">

        <div id="question">Are you ready? 🤍</div>

        <div class="buttonRow">

            <button class="btn" onclick="startJourney()">Yes</button>

            <button class="btn" onclick="startJourney()">Of Course</button>

        </div>

    </div>

    <div id="messageScreen" style="display:none;">

        <div id="message" class="fadeText"></div>

    </div>

    <div id="forgiveScreen">

        <div id="question">
            Do you forgive me for forgetting your birthday? 🥺
        </div>

        <div id="forgiveArea">

            <button class="btn" id="yesBtn">
                Yes 🤍
            </button>

            <button class="btn" id="noBtn">
                No 😤
            </button>

        </div>

    </div>

</div>

<audio id="bgMusic">
    <source src="1st.mp3" type="audio/mpeg">
</audio>

<script>

/* ---------- Journey Flow ---------- */

function startJourney(){

    document.querySelector(".buttonRow").style.display="none";

    document.getElementById("musicPlayer").style.display="block";

    audio.play();

    showMessage("Great! 🎉",1500,()=>{
        showMessage("Happy Birthday! 🎂🤍",2500,()=>{

            document.getElementById("messageScreen").style.display="none";
document.body.style.background =
'url("sry.png") center center/cover no-repeat fixed';

            document.getElementById("readyScreen").style.display="none";
document.getElementById("forgiveScreen").style.display="block";

        });

    });
}

function showMessage(text,time,next){

    const screen=document.getElementById("messageScreen");

    const msg=document.getElementById("message");

    screen.style.display="block";

    msg.innerHTML=text;

    msg.style.opacity="0";

    setTimeout(()=>{

        msg.style.opacity="1";

    },50);

    setTimeout(()=>{

        msg.style.opacity="0";

    },time);

    setTimeout(()=>{

        next();

    },time+1000);
}

/* ---------- Forgive Section ---------- */

const noBtn=document.getElementById("noBtn");

function moveNoButton(){

    const area = document.getElementById("forgiveArea");

    const btnWidth = noBtn.offsetWidth;

    const btnHeight = noBtn.offsetHeight;

    const maxX = area.clientWidth - btnWidth;

    const maxY = area.clientHeight - btnHeight;

    const x = Math.random() * maxX;

    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";

    noBtn.style.top = y + "px";
}
noBtn.addEventListener("mouseover", moveNoButton);

noBtn.addEventListener("click", moveNoButton);

noBtn.addEventListener("touchstart", (e) => {

    e.preventDefault();

    moveNoButton();

});

document.getElementById("yesBtn").addEventListener("click",()=>{

    document.getElementById("forgiveScreen").innerHTML=

    "<h1 style='font-size:48px;'>You're the best! 🤍</h1>";

    setTimeout(()=>{

        window.location.href="2nd.html";

    },2000);

});

/* ---------- Music Player ---------- */

const audio=document.getElementById("bgMusic");

const playPauseBtn=document.getElementById("playPauseBtn");

const progressBar=document.getElementById("progressBar");

const currentTime=document.getElementById("currentTime");

const duration=document.getElementById("duration");

const player=document.getElementById("musicPlayer");

playPauseBtn.addEventListener("click",()=>{

    if(audio.paused){

        audio.play();

        playPauseBtn.innerHTML="⏸";

        player.classList.remove("paused");

    }else{

        audio.pause();

        playPauseBtn.innerHTML="▶";

        player.classList.add("paused");
    }
});

audio.addEventListener("loadedmetadata",()=>{

    duration.textContent=formatTime(audio.duration);
});

audio.addEventListener("timeupdate",()=>{

    progressBar.value=
    (audio.currentTime/audio.duration)*100;

    currentTime.textContent=
    formatTime(audio.currentTime);
});

progressBar.addEventListener("input",()=>{

    audio.currentTime=
    (progressBar.value/100)*audio.duration;
});

function formatTime(seconds){

    let mins=Math.floor(seconds/60);

    let secs=Math.floor(seconds%60);

    if(secs<10){
        secs="0"+secs;
    }

    return mins+":"+secs;
}

</script>

</body>
</html>
